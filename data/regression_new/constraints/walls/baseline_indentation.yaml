species:
  - Ta: { mass: 180.95 Da, z: 73, charge: 0 e- }

eam_alloy_force:
  rcut: 5.30 ang
  eam_rho: true
  eam_rho2emb: true
  parameters:
    file: "../../../potentials/Ta1_Ravelo_2013.eam.alloy"

compute_force:
  - eam_alloy_force

particle_regions:
  - BOX:
      bounds: [ [ 0 ang, 0 ang, 5 ang ], [ 200 ang, 200 ang, 80 ang ] ]
  - BOTTOM:
      bounds: [ [ 0 ang, 0 ang, 0 ang ], [ 200 ang, 200 ang, 20 ang ] ]
  
setup_system:
  - domain:
      cell_size: 13.2 ang
      grid_dims: [ 10, 10, 10 ]
      bounds: [ [ 0 ang, 0 ang, 0 ang ], [ 132. ang, 132. ang, 132. ang ] ]
      xform: [ [ 1, 0, 0 ], [ 0, 1, 0 ], [ 0, 0, 1 ] ]
      periodic: [ true, true, false ]
      expandable: false
  - init_rcb_grid
  - lattice:
      structure: BCC
      types: [ Ta, Ta ]
      size: [ 3.3 ang, 3.3 ang, 3.3 ang ]
      region: BOX
  - init_temperature_new:
      T: 700. K
      override_velocities: true
      add_velocities: false
      scale_velocities: false
      zero_linear_momentum: true
      distribution: "gaussian"
    
global:
  max_iteration: 2000
  simulation_thermostate_screen_frequency: 50
  simulation_thermostate_file_frequency: -1
  simulation_snapshot_frequency: 50
  rcut_inc: 1.0 ang
  dt: 2.0e-3 ps
