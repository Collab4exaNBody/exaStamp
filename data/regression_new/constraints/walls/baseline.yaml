species:
  - Ta: { mass: 180.95 Da, z: 73, charge: 0 e- }

eam_alloy_force:
  rcut: 5.30 ang
  parameters:
    file: "Ta1_Ravelo_2013.eam.alloy"

compute_force:
  - eam_alloy_force

setup_system:
  - particle_regions:
      - BOX:
          bounds: [ [ 20 ang, 0 ang, 0 ang ], [ 80 ang, 33 ang, 33 ang ] ]
  - domain:
      cell_size: 6.6 ang
      grid_dims: [ 15, 5, 5 ]
      bounds: [ [ 0 ang, 0 ang, 0 ang ], [ 99. ang, 33. ang, 33. ang ] ]
      xform: [ [ 1, 0, 0 ], [ 0, 1, 0 ], [ 0, 0, 1 ] ]
      periodic: [ false, true, true ]
      expandable: false
  - init_rcb_grid
  - lattice:
      structure: BCC
      types: [ Ta, Ta ]
      size: [ 2.6 ang, 3.3 ang, 3.3 ang ]
      region: BOX
  - init_temperature_new:
      T: 700. K
      override_velocities: true
      add_velocities: false
      scale_velocities: false
      zero_linear_momentum: true
      distribution: "gaussian"

global:
  max_iteration: 200
  simulation_thermostate_screen_frequency: 50
  simulation_thermostate_file_frequency: -1
  simulation_snapshot_frequency: -1
  rcut_inc: 1.0 ang
  dt: 2.0e-3 ps
