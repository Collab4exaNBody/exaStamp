includes:
  - config_update_symmetric_forces.msp
  
write_restart:
  - message: { mesg: "Writing restart" }
write_snapshot:
  - message: { mesg: "Writing snapshot" }
perform_analysis:
  - message: { mesg: "Performing analysis" }
    
species:
  - Ni: { mass: 58.693 Da , z: 28 , charge: 0.0 e- }
      
compute_force:
  - lj_compute_force:
      parameters: { epsilon: 0.3729 eV , sigma: 2.2808 ang }
      rcut: 4.1 ang

setup_system:
  - particle_regions:
      - REG1:
          quadric:
            shape: sphere
            transform:
              - scale: [ 10 ang , 10 ang , 10 ang ]
              - translate: [ 15 ang , 15 ang , 15 ang ]
  - particle_types:
      particle_type_map: { Ni: 0 }
  - particle_type_add_properties:
      Ni: { mass: 58.693 Da , z: 28 }
  - init_rcb_grid
  - lattice:
      structure: FCC
      types: [ Ni , Ni , Ni , Ni]
      size: [ 4.5 ang , 4.5 ang , 4.5 ang ]
      region: REG1
  - init_temperature_new:
      T: 1. K
      override_velocities: true
      add_velocities: false
      scale_velocities: false
      zero_linear_momentum: true
      distribution: "gaussian"
  - shift_v:
      value: [ 1000 m/s , 1000. m/s, 1000. m/s ]

global:
  dt: 5e-3 ps
  rcut_inc: 2.0 ang
  simulation_restart_frequency: 100
  simulation_snapshot_frequency: 10
  simulation_analysis_frequency: 20
  simulation_thermostate_file_frequency: 5
  simulation_thermostate_screen_frequency: 10
  max_iteration: 200
