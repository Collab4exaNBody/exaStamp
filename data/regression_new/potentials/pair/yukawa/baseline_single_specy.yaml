grid_flavor: grid_flavor_multimat

species:
  - Fe: { mass: 55.845 Da , z: 26 , charge: 0.0 e- }

setup_system:
  - particle_types:
      particle_type_map: { Fe: 0 }
  - particle_type_add_properties:
      Fe: { mass: 55.845 Da , z: 26 , charge: 0.0 e- }
  - domain:
      cell_size: 5 ang
      grid_dims: [10,10,10]
      bounds: [[0 ang ,0 ang,0 ang],[50. ang, 50. ang, 50. ang]]
      xform: [[1.,0.,0.],[0.,1.,0.],[0.,0.,1.]]
      periodic: [true,true,true]
      expandable: false
  - init_rcb_grid
  - lattice:
      structure: SC
      types: [ Fe ]
      size: [ 1.0 ang ]
  - gaussian_noise_r: { sigma: 0.1 ang }
  - gaussian_noise_v: { sigma: 50. m/s }

write_snapshot:
  - timestep_file: "yukawa_%09d.xyz"
  - write_xyz:
      fields: [ id, type ]
      
global:
  max_iteration: 10000
  simulation_thermostate_screen_frequency: 10
  simulation_thermostate_file_frequency: -1
  simulation_snapshot_frequency: 10
  rcut_inc: 1.0 ang
  dt: 1.0e-3 ps

xxx_simulation_epilog:
  - check_values:
      file: check_values.dat
      pos_threshold: 5.e-10
      acc_threshold: 5.e-10
      vel_threshold: 5.e-10
